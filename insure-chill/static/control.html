<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Пульт: Застрахуй свой чилл</title>
  <link rel="stylesheet" href="/static/css/control.css?v=figma-control-frames" />
</head>
<body>
  <main id="control" class="control" data-phase="idle">
    <p id="connection" class="connection">подключение...</p>

    <section class="control-screen control-screen--start" data-screen="idle" aria-label="Старт">
      <div class="scene-bg" aria-hidden="true">
        <img class="blob blob--a" src="/static/assets/figma/control/raw/63ed6a4ccea3f66b2fb6e7da8ee2acf338557a82.svg" alt="" />
        <img class="blob blob--b" src="/static/assets/figma/control/raw/63ed6a4ccea3f66b2fb6e7da8ee2acf338557a82.svg" alt="" />
        <img class="fur fur--left" src="/static/assets/figma/control/raw/00b04727579141737620deeacb25fa19e92ae1f5.png" alt="" />
        <img class="fur fur--right" src="/static/assets/figma/control/raw/180918f8da7d62fb8a78a79158770294078c06fe.png" alt="" />
      </div>
      <img class="logo logo--start" src="/static/assets/figma/control/raw/2da3f8923a053f8811a635148d5f6eb019cc4afe.svg" alt="СберСтрахование" />
      <h1 class="start-title">защити<br />свой вайб</h1>
      <img class="ribbon ribbon--start" src="/static/assets/figma/control/raw/66ef35a5d32b6ae24598794ab7562171a475908e.svg" alt="" />

      <div class="threat threat--paw">
        <img src="/static/assets/figma/control/raw/758b324c82f48052d9537c8f4058eacfe56327c7.png" alt="" />
        <span class="label label--blue label--paw-a">кошачья лапа</span>
        <span class="label label--blue label--paw-b">толкает</span>
        <span class="label label--blue label--paw-c">телефон</span>
      </div>
      <div class="threat threat--fist">
        <img src="/static/assets/figma/control/raw/2c0e597ef34e1e25f22bece7f07f9071453c26c7.png" alt="" />
        <span class="label label--green label--fist-a">прилетает</span>
        <span class="label label--green label--fist-b">кулак</span>
      </div>
      <div class="threat threat--drop">
        <img src="/static/assets/figma/control/raw/9f7d921244f8a87720fb41610a93ffa0de6d9559.png" alt="" />
        <span class="label label--pink label--drop-a">капли</span>
        <span class="label label--pink label--drop-b">воды</span>
      </div>
      <img class="star star--start-a" src="/static/assets/figma/control/raw/c292fdd83b98d20cb547090b8f9de688e6f81a81.svg" alt="" />
      <img class="star star--start-b" src="/static/assets/figma/control/raw/f6128198a813be92610df498e15742dd9f0f28ff.svg" alt="" />
      <button id="startButton" class="control-button control-button--start" type="button">старт</button>
    </section>

    <section class="control-screen control-screen--game" data-screen="playing" aria-label="Игра" hidden>
      <div class="scene-bg" aria-hidden="true">
        <img class="blob blob--a" src="/static/assets/figma/control/raw/63ed6a4ccea3f66b2fb6e7da8ee2acf338557a82.svg" alt="" />
        <img class="blob blob--b" src="/static/assets/figma/control/raw/63ed6a4ccea3f66b2fb6e7da8ee2acf338557a82.svg" alt="" />
        <img class="fur fur--game-left" src="/static/assets/figma/control/raw/00b04727579141737620deeacb25fa19e92ae1f5.png" alt="" />
        <img class="fur fur--game-right" src="/static/assets/figma/control/raw/180918f8da7d62fb8a78a79158770294078c06fe.png" alt="" />
      </div>
      <div class="game-card">
        <img class="logo logo--game" src="/static/assets/figma/control/raw/7b14360a994d599902eb81b23613e97fc2d44b8b.svg" alt="СберСтрахование" />
        <h2 class="game-title">защити свой вайб</h2>
      </div>
      <img class="ribbon ribbon--game" src="/static/assets/figma/control/raw/b18f33e9853ec47a872957ecaf2ca74df67b398b.svg" alt="" />
      <img class="star star--game-a" src="/static/assets/figma/control/raw/75030c4d25dc9f4bbf5edeb5fa78c37b0d43acfb.svg" alt="" />
      <img class="star star--game-b" src="/static/assets/figma/control/raw/c7c4fcb5ff38869ca35da29f0306e5e722d206ea.svg" alt="" />
      <div class="stats" aria-live="polite">
        <div class="stat-card">
          <span>ваш счёт:</span>
          <strong id="score">000</strong>
        </div>
        <div class="stat-card">
          <span>таймер:</span>
          <strong id="timer">59 с</strong>
        </div>
      </div>
      <button id="insureButton" class="control-button control-button--insure" type="button" disabled>застраховать</button>
    </section>

    <section class="control-screen control-screen--result" data-screen="result" aria-label="После игры" hidden>
      <div class="scene-bg" aria-hidden="true">
        <img class="blob blob--a" src="/static/assets/figma/control/raw/63ed6a4ccea3f66b2fb6e7da8ee2acf338557a82.svg" alt="" />
        <img class="blob blob--b" src="/static/assets/figma/control/raw/63ed6a4ccea3f66b2fb6e7da8ee2acf338557a82.svg" alt="" />
        <img class="fur fur--result-left" src="/static/assets/figma/control/raw/00b04727579141737620deeacb25fa19e92ae1f5.png" alt="" />
        <img class="fur fur--result-right" src="/static/assets/figma/control/raw/180918f8da7d62fb8a78a79158770294078c06fe.png" alt="" />
      </div>
      <img class="logo logo--result" src="/static/assets/figma/control/raw/f8bdcbf65236835dcff5c84d001f71f941f7cdf4.svg" alt="СберСтрахование" />
      <h2 class="result-title">твой вайб<br />застрахован</h2>
      <p class="result-copy">До начала следующего<br />раунда <span id="resultCountdown">15</span>...</p>
      <img class="ribbon ribbon--result" src="/static/assets/figma/control/raw/66ef35a5d32b6ae24598794ab7562171a475908e.svg" alt="" />
      <img class="result-threat result-threat--soap" src="/static/assets/figma/control/raw/50dd6d488abd268621b18460892b1285006a37a8.png" alt="" />
      <img class="result-threat result-threat--drop" src="/static/assets/figma/control/raw/9f7d921244f8a87720fb41610a93ffa0de6d9559.png" alt="" />
      <img class="result-threat result-threat--hammer" src="/static/assets/figma/control/raw/dc3cb622f1e47b456839d5b24ff0448b31ef17b5.png" alt="" />
      <div class="insured-stamp">застраховано</div>
    </section>

    <button id="resetButton" class="service-reset" type="button">сброс</button>
  </main>

  <script type="module" src="/static/js/control.js?v=result-15"></script>
</body>
</html>
