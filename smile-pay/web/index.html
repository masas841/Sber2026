<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=504, height=504, initial-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#21a038" />
  <title>Smile Pay — оплата улыбкой</title>
  <link rel="stylesheet" href="/static/css/fonts.css?v=20260611-detection-zoom" />
  <link rel="stylesheet" href="/static/css/style.css?v=20260611-detection-zoom" />
</head>
<body>
  <main class="shell" id="shell">
    <div id="camera-slot" class="camera-slot">
      <div class="camera-slot__view">
        <div class="camera-slot__placeholder" aria-hidden="true"></div>
        <video id="preview" autoplay playsinline muted></video>
      </div>
    </div>
    <div id="stage-root" class="stage-root" aria-live="polite"></div>
    <p id="smile-status" class="smile-status" hidden></p>
  </main>
  <canvas id="snapshot" class="visually-hidden" aria-hidden="true"></canvas>
  <script type="module" src="/static/js/app.js?v=20260611-detection-zoom"></script>
</body>
</html>
