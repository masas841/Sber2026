<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>СберФест 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(145deg, #0d3b2e 0%, #1a6b4f 45%, #21a038 100%);
      color: #fff;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 48px 32px;
      backdrop-filter: blur(12px);
    }
    .logo {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      line-height: 1.55;
      opacity: 0.9;
    }
    .hint {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 14px;
      opacity: 0.65;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">Сбер · летние фестивали 2026</div>
    <h1>СберФест 2026</h1>
    <p>Здесь хранятся результаты интерактивов павильона — портреты и фото с&nbsp;«Улыбкометра».</p>
    <p class="hint">Откройте ссылку из QR-кода на стенде — на странице можно посмотреть фото и скачать его.</p>
  </main>
</body>
</html>
