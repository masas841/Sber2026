<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#88dec8">
  <title>Ваш портрет — ГИГАвайб</title>
  <link rel="stylesheet" href="/static/css/fonts.css">
  <link rel="stylesheet" href="/static/css/photo.css">
</head>
<body>
  <main class="photo-page">
    <div class="photo-canvas" aria-label="Ваш портрет">
      <picture class="photo-bg-wrap" aria-hidden="true">
        <source srcset="/static/assets/figma/bg-generation.webp" type="image/webp">
        <img class="photo-bg" src="/static/assets/figma/bg-generation.jpg" alt="" decoding="async">
      </picture>

      <div class="deco deco--3-3" aria-hidden="true">
        <div class="deco__box"><div class="deco__spin"><div class="deco__inner deco__inner--round">
          <img src="/static/assets/figma/deco-3-3.webp" alt="">
        </div></div></div>
      </div>

      <div class="deco deco--blob-a" aria-hidden="true"><img src="/static/assets/figma/ellipse-blob-a.svg" alt=""></div>
      <div class="deco deco--blob-b" aria-hidden="true"><img src="/static/assets/figma/ellipse-blob-b.svg" alt=""></div>

      <figure class="photo-frame">
        <img src="{{IMAGE_URL}}" alt="Ваш портрет">
      </figure>

      <div class="deco deco--leaf-bottom" aria-hidden="true">
        <div class="deco__box"><div class="deco__spin"><div class="deco__inner deco__crop deco__crop--leaf">
          <img src="/static/assets/figma/sheet-leaf.webp" alt="">
        </div></div></div>
      </div>
      <div class="deco deco--leaf-top" aria-hidden="true">
        <div class="deco__box"><div class="deco__spin"><div class="deco__inner deco__crop deco__crop--leaf">
          <img src="/static/assets/figma/sheet-leaf.webp" alt="">
        </div></div></div>
      </div>

      <div class="deco deco--2-right" aria-hidden="true">
        <div class="deco__box"><div class="deco__spin"><div class="deco__inner deco__crop deco__crop--2-right">
          <img src="/static/assets/figma/deco-2.webp" alt="">
        </div></div></div>
      </div>

      <div class="deco deco--glow-1" aria-hidden="true">
        <div class="deco__box"><div class="deco__spin"><img src="/static/assets/figma/ellipse-glow-1.svg" alt=""></div></div>
      </div>
      <div class="deco deco--glow-2" aria-hidden="true">
        <div class="deco__box"><div class="deco__spin"><img src="/static/assets/figma/ellipse-glow-2.svg" alt=""></div></div>
      </div>
      <div class="deco deco--glow-3" aria-hidden="true">
        <div class="deco__box"><div class="deco__spin"><img src="/static/assets/figma/ellipse-glow-3.svg" alt=""></div></div>
      </div>

      <div class="deco deco--2-left" aria-hidden="true">
        <div class="deco__box"><div class="deco__spin"><div class="deco__inner deco__crop deco__crop--2-left">
          <img src="/static/assets/figma/deco-2.webp" alt="">
        </div></div></div>
      </div>

      <img class="photo-logo" src="/static/assets/figma/giga-full.svg" alt="ГИГАчат" width="129" height="72" decoding="async">
      <a class="photo-download" href="{{DOWNLOAD_URL}}" download>Скачать</a>

      <div class="deco deco--flower-right" aria-hidden="true">
        <div class="deco__inner deco__crop deco__crop--flower">
          <img src="/static/assets/figma/flower.webp" alt="">
        </div>
      </div>
      <div class="deco deco--flower-left" aria-hidden="true">
        <div class="deco__box"><div class="deco__spin"><div class="deco__inner deco__crop deco__crop--flower">
          <img src="/static/assets/figma/flower.webp" alt="">
        </div></div></div>
      </div>

      <div class="deco deco--4" aria-hidden="true">
        <div class="deco__box"><div class="deco__spin"><div class="deco__inner deco__crop deco__crop--4">
          <img src="/static/assets/figma/deco-4.webp" alt="">
        </div></div></div>
      </div>
    </div>
  </main>
</body>
</html>
